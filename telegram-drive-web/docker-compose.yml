services:
  app:
    build: .
    container_name: telegram-drive-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
    ports:
      - "${BIND_HOST:-127.0.0.1}:${APP_PORT:-8080}:8080"
    volumes:
      - telegram_drive_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  caddy:
    profiles:
      - proxy
    image: caddy:2-alpine
    container_name: telegram-drive-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}

volumes:
  telegram_drive_data:
  caddy_data:
  caddy_config: